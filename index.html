<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公務車借用系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 辦公室選擇畫面 -->
  <div id="officePicker" class="office-picker">
    <div class="office-picker-inner">
      <div class="picker-logo">🚗</div>
      <div class="picker-title">公務車借用系統</div>
      <div class="picker-subtitle">請選擇您的辦公室</div>
      <div class="office-picker-grid" id="officePickerGrid"></div>
    </div>
  </div>

  <!-- 主應用 -->
  <div id="mainApp" style="display:none">

    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <button class="back-btn" id="backToOffices">&#8592;</button>
          <span class="logo-icon">🚗</span>
          <span class="logo-text" id="currentOfficeName"></span>
        </div>
        <button class="admin-btn" id="adminBtn">管理員入口</button>
      </div>
    </header>

    <!-- 管理員密碼彈窗 -->
    <div class="modal-overlay" id="adminModal">
      <div class="modal">
        <div class="modal-title">管理員登入</div>
        <input type="text" class="modal-input" id="adminPassword" placeholder="請輸入密碼" autocomplete="off">
        <div class="modal-error" id="adminError"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="adminCancelBtn">取消</button>
          <button class="btn btn-primary" id="adminConfirmBtn">確認</button>
        </div>
      </div>
    </div>

    <main class="main">

      <!-- 月曆 -->
      <section class="calendar-section">
        <div class="calendar-header">
          <button class="nav-btn" id="prevMonth">&#8592;</button>
          <div class="calendar-title" id="calendarTitle"></div>
          <button class="nav-btn" id="nextMonth">&#8594;</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="legend">
          <span class="legend-item"><span class="dot dot-available"></span>可借用</span>
          <span class="legend-item"><span class="dot dot-partial"></span>部分已借</span>
          <span class="legend-item"><span class="dot dot-full"></span>已借滿</span>
          <span class="legend-item"><span class="dot dot-blocked"></span>封鎖</span>
        </div>
      </section>

      <!-- 車輛管理（管理員限定）-->
      <section id="vehicleMgmt" style="display:none">
        <div class="section-label">車輛管理</div>
        <div id="vehicleMgmtList" class="mgmt-list"></div>
        <div class="mgmt-add">
          <input type="text" class="form-input" id="newVehicleName" placeholder="車輛名稱（例：新北一號）">
          <input type="text" class="form-input" id="newVehiclePlate" placeholder="車牌（例：ABC-1234）">
          <button class="btn btn-primary" id="addVehicleBtn">新增車輛</button>
        </div>
      </section>

      <!-- 登記紀錄 -->
      <section class="log-section">
        <div class="section-label">登記紀錄</div>
        <div class="booking-log" id="bookingLog"></div>
      </section>

    </main>

    <!-- 側邊欄 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-date" id="sidebarDate"></div>
        <button class="sidebar-close" id="sidebarClose">✕</button>
      </div>
      <div class="sidebar-body" id="sidebarBody"></div>
    </aside>

  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
