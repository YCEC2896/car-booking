<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公務車借用系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🚗</span>
        <span class="logo-text" id="currentOfficeName"></span>
      </div>
      <button class="admin-btn" id="adminBtn">管理員入口</button>
    </div>
  </header>

  <!-- 管理員功能列 -->
  <div class="admin-bar" id="adminBar" style="display:none">
    <div class="admin-bar-inner">
      <button class="admin-bar-btn" id="blockBtn">🔒 封鎖時段</button>
      <button class="admin-bar-btn" id="exportBtn">📊 匯出紀錄</button>
      <button class="admin-bar-btn" id="vehicleMgmtBtn">🚗 管理車輛</button>
    </div>
  </div>

  <!-- 管理員密碼彈窗 -->
  <div class="modal-overlay" id="adminModal">
    <div class="modal">
      <div class="modal-title">管理員登入</div>
      <input type="text" class="modal-input" id="adminPassword" placeholder="請輸入密碼" autocomplete="off">
      <div class="modal-error" id="adminError"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="adminCancelBtn">取消</button>
        <button class="btn btn-primary" id="adminConfirmBtn">確認</button>
      </div>
    </div>
  </div>

  <!-- 封鎖面板 -->
  <div class="panel-overlay" id="blockPanelOverlay"></div>
  <div class="panel" id="blockPanel">
    <div class="panel-header">
      <div class="panel-title">🔒 封鎖時段</div>
      <button class="sidebar-close" id="blockPanelClose">✕</button>
    </div>
    <div class="panel-body">
      <div class="form-group">
        <label>日期</label>
        <input type="date" class="form-input" id="blockDate" min="2024-01-01" max="2099-12-31">
      </div>
      <div class="form-group">
        <label>封鎖時段</label>
        <div class="period-options period-checkbox">
          <label class="period-opt checkbox-opt"><input type="radio" name="blockPeriod" value="full"><span>整天</span></label>
          <label class="period-opt checkbox-opt"><input type="radio" name="blockPeriod" value="am1"><span>08:00–10:00</span></label>
          <label class="period-opt checkbox-opt"><input type="radio" name="blockPeriod" value="am2"><span>10:00–12:30</span></label>
          <label class="period-opt checkbox-opt"><input type="radio" name="blockPeriod" value="pm1"><span>12:30–15:00</span></label>
          <label class="period-opt checkbox-opt"><input type="radio" name="blockPeriod" value="pm2"><span>15:00–18:00</span></label>
        </div>
      </div>
      <div class="form-group">
        <label>車輛（可複選）</label>
        <div class="period-options period-checkbox" id="blockVehicleList"></div>
      </div>
      <div class="form-group">
        <label>原因</label>
        <div class="reason-btns"><button class="reason-btn" onclick="setBlockReason('車輛保養')">車輛保養</button></div>
        <input type="text" class="form-input" id="blockReason" placeholder="輸入或選擇原因（選填）" style="margin-top:6px">
      </div>
      <button class="btn btn-danger btn-block" id="submitBlockBtn">確認封鎖</button>
    </div>
  </div>

  <!-- 匯出面板 -->
  <div class="panel-overlay" id="exportPanelOverlay"></div>
  <div class="panel" id="exportPanel">
    <div class="panel-header">
      <div class="panel-title">📊 匯出紀錄</div>
      <button class="sidebar-close" id="exportPanelClose">✕</button>
    </div>
    <div class="panel-body">
      <div class="form-group">
        <label>選擇月份（可複選）</label>
        <div class="period-options period-checkbox" id="exportMonthList"></div>
      </div>
      <button class="btn btn-primary btn-block" id="submitExportBtn">匯出 CSV</button>
    </div>
  </div>

  <!-- 車輛管理面板 -->
  <div class="panel-overlay" id="vehiclePanelOverlay"></div>
  <div class="panel" id="vehiclePanel">
    <div class="panel-header">
      <div class="panel-title">🚗 管理車輛</div>
      <button class="sidebar-close" id="vehiclePanelClose">✕</button>
    </div>
    <div class="panel-body">
      <div id="vehiclePanelList" class="mgmt-list"></div>
      <div class="form-group">
        <label>新增車輛</label>
        <div class="emp-row">
          <input type="text" class="form-input" id="newVehiclePlate" placeholder="車牌號碼（例：ABC-1234）">
          <button class="btn btn-primary btn-sm" id="addVehicleBtn">新增</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 主內容 -->
  <main class="main">
    <section class="calendar-section">
      <div class="calendar-header">
        <button class="nav-btn" id="prevMonth">&#8592;</button>
        <div class="calendar-title" id="calendarTitle"></div>
        <button class="nav-btn" id="nextMonth">&#8594;</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="legend">
        <span class="legend-item"><span class="dot dot-available"></span>有空車</span>
        <span class="legend-item"><span class="dot dot-partial"></span>零星時段</span>
        <span class="legend-item"><span class="dot dot-full"></span>無空車</span>
      </div>
    </section>
    <section class="log-section">
      <div class="section-label">登記紀錄</div>
      <div class="booking-log" id="bookingLog"></div>
    </section>
  </main>

  <!-- 側邊欄 -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-date" id="sidebarDate"></div>
      <button class="sidebar-close" id="sidebarClose">✕</button>
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
  </aside>

  <div class="toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
